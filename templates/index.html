<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Disease Prediction System</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="bg-animation"></div>

<header class="main-header">
    <h1>🩺 Multi Disease Prediction System</h1>
    <p>Diabetes & Cardiovascular Risk Analysis using Machine Learning</p>
</header>

<section class="dashboard">

    <!-- LEFT SIDE : DIABETES -->
    <div class="card diabetes-card">
        <h2>🩸 Diabetes Prediction</h2>

        <div class="form-grid">
            <input type="text" id="d_gender" placeholder="Gender (Male/Female)">
            <input type="number" id="d_age" placeholder="Age">
            <input type="number" id="d_hyper" placeholder="Hypertension (0/1)">
            <input type="number" id="d_heart" placeholder="Heart Disease (0/1)">
            <input type="text" id="d_smoking" placeholder="Smoking History">
            <input type="number" step="0.1" id="d_bmi" placeholder="BMI">
            <input type="number" step="0.1" id="d_hba1c" placeholder="HbA1c">
            <input type="number" id="d_glucose" placeholder="Glucose">
        </div>

        <button class="btn btn-diabetes" onclick="predictDiabetes()">
            Predict Diabetes
        </button>

        <div class="result-box" id="diabetesResult">
            Waiting for prediction...
        </div>

        <canvas id="diabetesChart"></canvas>
    </div>


    <!-- RIGHT SIDE : CARDIO -->
    <div class="card cardio-card">
        <h2>❤️ Cardiovascular Prediction</h2>

        <div class="form-grid">
            <input type="number" id="c_age" placeholder="Age">
            <input type="number" id="c_gender" placeholder="Gender (1=Male,0=Female)">
            <input type="number" id="c_height" placeholder="Height (cm)">
            <input type="number" id="c_weight" placeholder="Weight (kg)">
            <input type="number" id="c_ap_hi" placeholder="Systolic BP">
            <input type="number" id="c_ap_lo" placeholder="Diastolic BP">
            <input type="number" id="c_chol" placeholder="Cholesterol (1-3)">
            <input type="number" id="c_gluc" placeholder="Glucose (1-3)">
            <input type="number" id="c_smoke" placeholder="Smoke (0/1)">
            <input type="number" id="c_alco" placeholder="Alcohol (0/1)">
            <input type="number" id="c_active" placeholder="Activity (0/1)">
        </div>

        <button class="btn btn-cardio" onclick="predictCardio()">
            Predict Cardio
        </button>

        <div class="result-box" id="cardioResult">
            Waiting for prediction...
        </div>

        <canvas id="cardioChart"></canvas>
    </div>

</section>

<footer class="footer">
    <p>© 2026 Multi Disease Prediction Project | Built with Flask + ML + HTML/CSS/JS</p>
</footer>

<!-- JS -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
